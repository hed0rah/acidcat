name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bubblewrap
        # exercises the --sandbox bwrap profile for real. Ubuntu 24.04 blocks
        # unprivileged user namespaces via AppArmor, so relax that sysctl for
        # the runner; the sandbox tests skip gracefully if it still cannot run.
        run: |
          sudo apt-get update && sudo apt-get install -y bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[analysis,ml,mcp]" pytest
      - name: Run tests
        run: pytest -q
